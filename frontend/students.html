<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Management System - Students</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="students">
  <main class="page page-students">
    <header class="topbar">
      <h1>Students</h1>
      <nav>
        <a class="button-link" href="dashboard.html">Back to Dashboard</a>
      </nav>
    </header>

    <section class="card">
      <h2 id="formTitle">Add Student</h2>
      <form id="studentForm" novalidate>
        <input type="hidden" id="studentId" value="" />

        <label for="studentName">Name</label>
        <input type="text" id="studentName" name="name" required />

        <label for="studentEmail">Email</label>
        <input type="email" id="studentEmail" name="email" />

        <label for="studentAge">Age</label>
        <input type="number" id="studentAge" name="age" min="0" />

        <div class="form-actions">
          <button type="submit" id="saveBtn">Save</button>
          <button type="button" id="cancelEditBtn" class="secondary" hidden>
            Cancel
          </button>
        </div>
      </form>
    </section>

    <section class="card">
      <div class="table-header">
        <h2>All Students</h2>
        <button id="refreshBtn" class="secondary">Refresh</button>
      </div>

      <table id="studentsTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Age</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="studentsTableBody">
          <!-- Rows injected by script.js -->
        </tbody>
      </table>
    </section>

    <p id="statusMessage" class="status" role="status"></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
